# Xorg config — headless NVIDIA A5000 server with virtual 1920x1080 framebuffer.
# Used by /workspace/start_gui_nvidia.sh (Option B).

Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0"
EndSection

Section "Files"
    # Pin the NVIDIA-supplied X modules first, then fall back to Xorg defaults.
    ModulePath "/usr/lib/x86_64-linux-gnu/nvidia/xorg"
    ModulePath "/usr/lib/xorg/modules"
EndSection

Section "Module"
    Load "glx"
EndSection

Section "ServerFlags"
    Option "AllowEmptyInput"      "true"
    Option "AutoAddDevices"       "false"
    Option "AutoAddGPU"           "false"
    Option "DontVTSwitch"         "true"
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync   28.0 - 80.0
    VertRefresh 48.0 - 75.0
EndSection

Section "Device"
    Identifier "Device0"
    Driver     "nvidia"
    VendorName "NVIDIA Corporation"
    BoardName  "RTX A5000"
    BusID      "PCI:1:0:0"
    Option "UseDisplayDevice"               "None"
    Option "AllowEmptyInitialConfiguration" "True"
    Option "ConnectToAcpid"                 "False"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Device0"
    Monitor    "Monitor0"
    DefaultDepth 24
    Option "AllowEmptyInitialConfiguration" "True"
    SubSection "Display"
        Depth   24
        Virtual 1920 1080
    EndSubSection
EndSection
