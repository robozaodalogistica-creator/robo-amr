# nav2_map_server configuration for serving a pre-built occupancy map.
# yaml_filename is intentionally empty and must be overridden by launch arguments.

map_server:
  ros__parameters:
    use_sim_time: true

    yaml_filename: ""
    frame_id: map
    topic_name: map
    free_thresh: 0.25
    occupied_thresh: 0.65
