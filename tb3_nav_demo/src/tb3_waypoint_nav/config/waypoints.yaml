# 5 waypoints — pentagon pattern centred at world origin
# Used by launch files; waypoint_navigator.py embeds the same values directly.
waypoints:
  - name: "WP1 – Leste"
    x:  1.5
    y:  0.0
    yaw_deg:  90.0
  - name: "WP2 – Nordeste"
    x:  1.0
    y:  1.5
    yaw_deg: 180.0
  - name: "WP3 – Norte"
    x:  0.0
    y:  1.8
    yaw_deg: -90.0
  - name: "WP4 – Noroeste"
    x: -1.0
    y:  1.0
    yaw_deg: -45.0
  - name: "WP5 – Origem"
    x:  0.0
    y:  0.0
    yaw_deg:  0.0
