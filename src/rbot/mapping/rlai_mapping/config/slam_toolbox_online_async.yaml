# rlai_mapping/config/slam_toolbox_online_async.yaml
#
# slam_toolbox async_slam_toolbox_node configuration for rbot.
#
# Mode: online async mapping — builds a map in real time while the robot
#       navigates.  Serialise the finished map with:
#         ros2 service call /slam_toolbox/save_map slam_toolbox/srv/SaveMap \
#           "{name: {data: '/path/to/map'}}"
#
# TF chain provided by this node:
#   map → odom   (slam_toolbox publishes this)
#   odom → base_footprint is owned by EKF; do NOT let slam_toolbox
#   republish that transform (publish_odom_tf must remain false).
#
# Coordinate frames:
#   scan_topic:         /scan               (2D LiDAR, 15 Hz)
#   base_frame:         base_footprint
#   odom_frame:         odom
#   map_frame:          map
#   odom_input_topic:   odometry/filtered   (EKF output — smoother than wheel_odom)

slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Solver configuration
    solver_plugin:            solver_plugins::CeresSolver
    ceres_linear_solver:      SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:     SCHUR_JACOBI
    ceres_trust_strategy:     LEVENBERG_MARQUARDT
    ceres_dogleg_type:        TRADITIONAL_DOGLEG
    ceres_loss_function:      HuberLoss    # robust to outlier scan matches in repetitive corridors

    scan_topic:               /scan

    # Filter out returns closer than the robot body (0.30 m) to prevent
    # ego-points from being baked into the map.
    minimum_laser_range:      0.30
    maximum_laser_range:      12.0

    # Coordinate frames
    odom_frame:               odom
    map_frame:                map
    base_frame:               base_footprint

    # Odometry source
    # Use EKF-filtered odometry rather than raw wheel_odom so that
    # IMU correction is already applied before SLAM sees it.
    use_scan_matching:        true
    use_scan_barycenter:      true

    # Transform output
    # slam_toolbox publishes map→odom only.
    # EKF owns odom→base_footprint; do not republish it here.
    transform_publish_period: 0.02     # seconds (50 Hz)
    tf_buffer_duration:       30.0     # seconds — generous for simulation startup

    # Map parameters
    resolution:               0.05     # metres/cell (5 cm — standard nav2 grid)
    map_update_interval:      5.0      # seconds between map publishes

    # online_async — builds map incrementally while the robot moves.
    # (This file is loaded by async_slam_toolbox_node, which implies async mode.)
    mode:                     mapping

    # Scan matching
    minimum_travel_distance:  0.3      # metres — update only after moving
    minimum_travel_heading:   0.3      # radians

    scan_buffer_size:                 10
    scan_buffer_maximum_scan_distance: 10.0  # metres
    link_match_minimum_response_fine:  0.55  # raised: reject weak local scan links
    link_scan_maximum_distance:        1.5
    loop_search_maximum_distance:      2.0   # reduced: don't match across distant corridors

    # Loop closure
    do_loop_closing:          true
    loop_match_minimum_chain_size:     10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.55  # raised from 0.35 — reject corridor aliasing
    loop_match_minimum_response_fine:   0.65  # raised from 0.45 — only close confident loops

    # Correlation parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.05   # tighter: less blurring between similar corridor poses

    loop_search_space_dimension:       8.0
    loop_search_space_resolution:      0.05
    loop_search_space_smear_deviation: 0.03

    # Fine scan matching parameters
    distance_variance_penalty:    0.5
    angle_variance_penalty:       1.0
    fine_search_angle_offset:     0.00349  # 0.2 degrees
    coarse_search_angle_offset:   0.349    # 20 degrees
    coarse_angle_resolution:      0.0349   # 2 degrees
    minimum_angle_penalty:        0.9
    minimum_distance_penalty:     0.5
    use_response_expansion:       true

    # Serialisation
    # Pose graph can be saved/loaded for later localisation-only mode.
    map_file_name:            ""        # set at runtime via service call
    map_start_at_dock:        false

    # Debug and diagnostics
    debug_logging:            false
    throttle_scans:           1        # use every scan (increase to skip)
    interactive_mode:         false    # disable interactive RViz plugin
