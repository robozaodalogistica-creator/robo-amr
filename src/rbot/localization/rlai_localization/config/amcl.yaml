# rlai_localization/config/amcl.yaml
#
# nav2_amcl configuration for rbot.
#
# AMCL localises the robot against a pre-built occupancy map and publishes
# the map → odom transform, completing the TF chain:
#   map → odom → base_footprint → [sensor frames]
#
# Prerequisites:
#   - A /map topic must already be available (provided by nav2_map_server,
#     which loads a map created in Phase 6 via slam_toolbox).
#   - EKF (ekf.yaml) must be running to provide odom → base_footprint.
#
# Sensor: 2D LiDAR on topic /scan, frame lidar_2d_link
# Robot model: differential drive

amcl:
  ros__parameters:
    use_sim_time: true

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # Odometry motion model noise parameters
    # alpha1–alpha4: translational and rotational noise from motion
    alpha1: 0.2     # rot noise from rotation
    alpha2: 0.2     # rot noise from translation
    alpha3: 0.2     # trans noise from translation
    alpha4: 0.2     # trans noise from rotation

    laser_model_type: "likelihood_field"
    scan_topic:       /scan
    laser_min_range:  0.1
    laser_max_range:  25.0
    max_beams:        60             # beams used per update (downsampled from 720)

    # Likelihood field parameters
    sigma_hit:        0.2            # std dev of hit distribution [m]
    z_hit:            0.5            # weight of hit model
    z_rand:           0.5            # weight of random measurement
    laser_likelihood_max_dist: 2.0   # max obstacle lookup distance [m]

    # Particle filter
    min_particles:    500
    max_particles:    2000
    pf_err:           0.05
    pf_z:             0.99

    # KLD resampling
    resample_interval: 1
    kld_err:          0.05
    kld_z:            0.99

    # Recovery — random particle injection when filter diverges
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    # Motion update thresholds
    # Filter only updates when robot has moved sufficiently (reduces CPU load)
    update_min_d:  0.2              # [m]   minimum translation before update
    update_min_a:  0.2              # [rad] minimum rotation before update

    # Transform output
    # AMCL publishes map → odom transform.
    # EKF owns odom → base_footprint; AMCL must NOT publish that transform.
    odom_frame_id:       odom
    base_frame_id:       base_footprint
    global_frame_id:     map
    transform_tolerance: 1.0        # seconds — generous for simulation
    tf_broadcast:        true

    # Initial pose
    # Robot starts at (1.0, 1.0) — clearly in open floor space, away from obstacles.
    # Gazebo spawn position must match this, or manually publish /initialpose.
    set_initial_pose: true
    initial_pose:
      x: 1.0
      y: 1.0
      z: 0.0
      yaw: 0.0

    save_pose_rate:    0.5           # Hz — saves pose to parameter server
    do_beamskip:       false
    beam_skip_distance:  0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
